name: kontafy_mobile
description: Kontafy - Smart Accounting for Indian Businesses
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Networking
  dio: ^5.7.0

  # Storage
  flutter_secure_storage: ^9.2.0
  shared_preferences: ^2.3.0

  # Navigation
  go_router: ^14.6.0

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.0
  fl_chart: ^0.70.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.0
  connectivity_plus: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

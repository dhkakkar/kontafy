name: Build Desktop Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Windows MSI installer
        working-directory: apps/desktop
        run: ./gradlew packageMsi

      - name: Build Windows uber JAR
        working-directory: apps/desktop
        run: ./gradlew packageWindowsJar

      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Kontafy-Windows-MSI
          path: apps/desktop/build/compose/binaries/main/msi/*.msi

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: Kontafy-Windows-JAR
          path: apps/desktop/build/jars/*.jar

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build macOS DMG
        working-directory: apps/desktop
        run: ./gradlew packageDmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Kontafy-macOS-DMG
          path: apps/desktop/build/compose/binaries/main/dmg/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Linux DEB
        working-directory: apps/desktop
        run: ./gradlew packageDeb

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: Kontafy-Linux-DEB
          path: apps/desktop/build/compose/binaries/main/deb/*.deb

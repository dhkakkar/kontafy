# --------------------------------------------------
# Kontafy Platform - Nginx Reverse Proxy
# SSL: Self-signed certs for Cloudflare Full mode
# --------------------------------------------------

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name kontafy.com www.kontafy.com api.kontafy.com app.kontafy.com;
    return 301 https://$host$request_uri;
}

# Landing Website - kontafy.com -> website:5000
server {
    listen 443 ssl;
    server_name kontafy.com www.kontafy.com;

    ssl_certificate     /etc/nginx/certs/kontafy.crt;
    ssl_certificate_key /etc/nginx/certs/kontafy.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass http://website:5000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}

# API - api.kontafy.com -> api:5002
server {
    listen 443 ssl;
    server_name api.kontafy.com;

    ssl_certificate     /etc/nginx/certs/kontafy.crt;
    ssl_certificate_key /etc/nginx/certs/kontafy.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass http://api:5002;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}

# Web App - app.kontafy.com -> web:5001
server {
    listen 443 ssl;
    server_name app.kontafy.com;

    ssl_certificate     /etc/nginx/certs/kontafy.crt;
    ssl_certificate_key /etc/nginx/certs/kontafy.key;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 50M;

    location / {
        proxy_pass http://web:5001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Next.js HMR / WebSocket support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }
}

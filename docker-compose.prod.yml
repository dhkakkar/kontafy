services:
  redis:
    image: redis:7-alpine
    container_name: kontafy-redis
    restart: always
    volumes:
      - kontafy_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - kontafy-net

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kontafy-api
    restart: always
    ports:
      - "5002:5002"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 5002
      REDIS_URL: redis://redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - kontafy-net

  website:
    build:
      context: .
      dockerfile: apps/website/Dockerfile
    container_name: kontafy-website
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5000
    depends_on:
      - api
    networks:
      - kontafy-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.kontafy.com/v1
    container_name: kontafy-web
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 5001
      NEXT_PUBLIC_API_URL: https://api.kontafy.com/v1
    depends_on:
      - api
    networks:
      - kontafy-net

  nginx:
    image: nginx:alpine
    container_name: kontafy-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/kontafy-platform.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - website
      - web
    networks:
      - kontafy-net

volumes:
  kontafy_redis:
    driver: local

networks:
  kontafy-net:
    driver: bridge

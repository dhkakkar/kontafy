version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: kontafy-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-kontafy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kontafy_dev}
      POSTGRES_DB: ${POSTGRES_DB:-kontafy_dev}
    volumes:
      - kontafy_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kontafy} -d ${POSTGRES_DB:-kontafy_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: kontafy-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - kontafy_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  kontafy_pgdata:
    driver: local
  kontafy_redis:
    driver: local
